<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yong's Miniroom</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nanum Gothic',sans-serif;background:#E8DDD4;min-height:100vh;display:flex;flex-direction:column;align-items:center;color:#555;user-select:none;image-rendering:auto}
.banner{margin-top:14px;text-align:center}
.banner h1{font-size:18px;font-weight:800;color:#8B6050;letter-spacing:1px;text-shadow:1px 1px 0 #fff}
.banner .sub{font-size:11px;color:#A08070;margin-top:2px}
.vc{margin-top:4px;font-size:10px;color:#A08070;background:rgba(255,255,255,.7);padding:2px 12px;border-radius:10px;display:inline-block}
.room-wrap{margin-top:10px;padding:6px;background:#F5EDE5;border-radius:4px;border:3px solid #C8B8A8;box-shadow:2px 2px 0 #B0A090,inset 1px 1px 0 #fff}
.room{width:820px;height:560px;position:relative;overflow:hidden;border-radius:2px;background:#C8DDF0}
/* Pixel overlay for retro dot feel */
.room::after{content:'';position:absolute;inset:0;z-index:50;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.02) 2px,rgba(0,0,0,.02) 4px);mix-blend-mode:multiply}
/* Walls & Floor - flat pastels like real Cyworld */
.wl{position:absolute;width:100%;height:100%;background:#FFDDE5;clip-path:polygon(50% 3.6%,6.1% 31.3%,6.1% 65.2%,50% 43.8%);z-index:1}
.wl::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(180deg,transparent,transparent 18px,rgba(255,255,255,.3) 18px,rgba(255,255,255,.3) 20px);opacity:.5}
.wr{position:absolute;width:100%;height:100%;background:#FFD0DB;clip-path:polygon(50% 3.6%,93.9% 31.3%,93.9% 65.2%,50% 43.8%);z-index:1}
.wr::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(180deg,transparent,transparent 18px,rgba(255,255,255,.25) 18px,rgba(255,255,255,.25) 20px);opacity:.5}
.wc{position:absolute;left:50%;top:3.6%;width:3px;height:40.2%;background:#C89098;z-index:2;transform:translateX(-1px)}
/* Wood plank floor - Cyworld ref color #b78c71 */
.fl{position:absolute;width:100%;height:100%;background:
  repeating-linear-gradient(120deg,transparent,transparent 20px,rgba(120,80,50,.15) 20px,rgba(120,80,50,.15) 22px),
  repeating-linear-gradient(60deg,transparent,transparent 20px,rgba(120,80,50,.10) 20px,rgba(120,80,50,.10) 22px),
  repeating-linear-gradient(120deg,#c9a070 0px,#b78c71 10px,#c49a68 10px,#b08060 20px),
  #b78c71;clip-path:polygon(50% 43.8%,6.1% 65.2%,50% 91.1%,93.9% 65.2%);z-index:3}
/* Baseboards - solid colors */
.bl{position:absolute;width:100%;height:100%;z-index:4;pointer-events:none}
.bl::after{content:'';position:absolute;inset:0;background:var(--bl-bg, #bbb9b6);clip-path:polygon(50% 43.8%,6.1% 65.2%,6.1% 66.8%,50% 45.4%)}
.br{position:absolute;width:100%;height:100%;z-index:4;pointer-events:none}
.br::after{content:'';position:absolute;inset:0;background:var(--br-bg, #a8a6a2);clip-path:polygon(50% 43.8%,93.9% 65.2%,93.9% 66.8%,50% 45.4%)}

/* SVG furniture layer */
#fsvg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;shape-rendering:crispEdges}
#fsvg polygon{cursor:pointer;stroke-linejoin:miter}
#fsvg polygon:hover{opacity:.85}
#fsvg .face-top{stroke:#3a3428;stroke-width:1.2}
#fsvg .face-left{stroke:#3a3428;stroke-width:1.2}
#fsvg .face-right{stroke:#3a3428;stroke-width:1.2}

/* Content overlays */
.content-overlay{position:absolute;top:0;left:0;width:820px;height:560px;z-index:6;pointer-events:none}
.content-overlay>*{pointer-events:auto}
#framePhoto{position:absolute;object-fit:contain;background:#2a2018;display:none}
#tvVideo{position:absolute;display:none;background:#000}
#tvVideo::-webkit-media-controls{display:none!important}
/* Retro TV */
.tv-crt{position:absolute;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.08) 0px,rgba(0,0,0,.08) 1px,transparent 1px,transparent 3px);z-index:1;mix-blend-mode:multiply}
.tv-controls{position:absolute;display:flex;align-items:center;gap:4px;padding:5px 8px;background:rgba(0,0,0,.75);border-radius:6px;z-index:20;pointer-events:auto;backdrop-filter:blur(4px);transform-origin:left center;transform:rotate(18.43deg)}
.tv-btn{background:none;border:2px solid rgba(255,255,255,.6);color:#fff;border-radius:50%;width:22px;height:22px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.tv-btn:hover{background:rgba(255,255,255,.2)}
.tv-progress{flex:1;height:4px;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer;position:relative;overflow:hidden}
.tv-progress-fill{height:100%;background:linear-gradient(90deg,#E75480,#FF8FAB);border-radius:2px;width:0%;transition:width .1s}
.tv-time{color:rgba(255,255,255,.7);font-size:7px;font-family:'Courier New',monospace;flex-shrink:0;letter-spacing:0.5px}
.tv-vol{width:30px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer;flex-shrink:0;position:relative;overflow:hidden}
.tv-vol-fill{height:100%;background:#4ECDC4;border-radius:2px;width:70%}
.tv-wrap{position:absolute;overflow:hidden;display:none}
.frame-counter{position:absolute;background:rgba(0,0,0,.6);color:#fff;font-size:8px;padding:1px 4px;border-radius:3px;display:none;z-index:7}
.frame-placeholder,.tv-placeholder{position:absolute;font-size:9px;color:rgba(255,255,255,.7);text-align:center;pointer-events:auto;cursor:pointer;display:flex;align-items:center;justify-content:center}
.book-tooltip{position:fixed;background:rgba(0,0,0,.85);color:#fff;font-size:11px;padding:4px 10px;border-radius:6px;white-space:nowrap;display:none;z-index:9999;pointer-events:none;max-width:200px;overflow:hidden;text-overflow:ellipsis}

/* Avatar */
.avatar{position:absolute;z-index:10;text-align:center}
.avatar-bubble{display:inline-block;background:#fff;border:2px solid #555;border-radius:14px;padding:2px 12px;font-size:11px;font-weight:800;color:#333;margin-bottom:2px;box-shadow:1px 1px 0 #999;position:relative}
.avatar-bubble::after{content:'';position:absolute;bottom:-6px;left:50%;width:8px;height:8px;background:#fff;border-right:2px solid #555;border-bottom:2px solid #555;transform:translateX(-50%) rotate(45deg)}
/* ===== 미니미 Canvas 픽셀아트 ===== */
.minimi{position:relative;width:64px;height:96px;margin:0 auto}
.minimi canvas{image-rendering:pixelated;-ms-interpolation-mode:nearest-neighbor;display:block}
.minimi-head{position:absolute;top:0;left:0;width:64px;height:40px;z-index:2;pointer-events:none}
.minimi-head img{width:36px;height:36px;object-fit:cover;border-radius:50%;position:absolute;top:8px;left:14px;display:none;image-rendering:auto;border:2px solid #282018}
.minimi-head.has-img img{display:block;z-index:10}
.avatar-photo{display:none}
.avatar-photo img{display:none}

/* Friend avatar */
.friend-avatar{display:none}
.friend-delete{display:inline-block;width:16px;height:16px;background:#E75480;color:#fff;border-radius:50%;font-size:10px;line-height:16px;text-align:center;cursor:pointer;position:absolute;top:-4px;right:-4px;z-index:3;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.friend-delete:hover{background:#C4405A;transform:scale(1.1)}
/* friend avatar colors are handled by drawMinimi palette */

/* Chat */
.chat-panel{position:absolute;bottom:8px;left:8px;z-index:20;width:260px;max-height:180px;background:rgba(255,248,240,.95);border:2px solid #D8C0B0;border-radius:3px;display:flex;flex-direction:column;box-shadow:2px 2px 0 rgba(0,0,0,.1)}
.chat-log{flex:1;overflow-y:auto;padding:6px 8px;font-size:10px;max-height:120px}
.chat-msg{margin-bottom:4px;line-height:1.3}
.chat-msg b{color:#C06040}
.chat-msg.friend b{color:#6080A0}
.chat-input-wrap{display:flex;border-top:1px solid #D8C0B0;padding:4px}
.chat-input-wrap input{flex:1;border:2px solid #D8C0B0;border-radius:2px;padding:3px 6px;font-size:10px;font-family:inherit;outline:none;background:#FFF8F0}
.chat-input-wrap button{margin-left:4px;padding:3px 8px;background:#F0D8C8;border:2px solid #D8C0B0;border-radius:2px;font-size:10px;cursor:pointer;font-family:inherit;font-weight:700;color:#8B6050}
.speech-float{position:absolute;background:#fff;border:2px solid #555;border-radius:10px;padding:2px 8px;font-size:9px;font-weight:700;white-space:nowrap;z-index:16;animation:floatUp 3s forwards;pointer-events:none}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateY(-20px)}}

/* BGM */
.bgm{position:absolute;bottom:8px;right:8px;z-index:20;background:rgba(255,248,240,.95);border:2px solid #D8C0B0;border-radius:3px;padding:4px 10px;font-size:10px;color:#8B7060;display:flex;align-items:center;gap:6px;box-shadow:2px 2px 0 rgba(0,0,0,.1)}
.bgm-btn{background:#F0D8C8;border:2px solid #D8C0B0;border-radius:2px;padding:1px 6px;font-size:9px;font-weight:700;color:#8B6050;cursor:pointer;font-family:inherit}
.bgm-title{max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Theme transition */
.wl,.wr,.fl,.room,.room-wrap{transition:background .8s ease}
.wc,.bl::after,.br::after{transition:background .8s ease}

/* AI Theme Modal */
.ai-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center}
.ai-modal.show{display:flex}
.ai-modal-box{background:#fff;border-radius:16px;padding:24px;max-width:400px;width:90%;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.2)}
.ai-modal-box h3{color:#E75480;margin-bottom:8px;font-size:16px}
.ai-modal-box p{font-size:12px;color:#888;margin-bottom:12px;line-height:1.5}
.ai-modal-box input{width:100%;padding:8px 12px;border:2px solid #F5C6D0;border-radius:8px;font-size:12px;font-family:inherit;outline:none;margin-bottom:8px}
.ai-modal-box input:focus{border-color:#E75480}
.ai-modal-box .ai-btns{display:flex;gap:8px;justify-content:center}
.ai-modal-box button{padding:8px 16px;border-radius:8px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer}
.ai-modal-box .ai-ok{background:#E75480;color:#fff;border:none}
.ai-modal-box .ai-cancel{background:#eee;color:#666;border:none}
.theme-indicator{position:absolute;top:8px;right:8px;z-index:20;background:rgba(255,255,255,.85);border:2px solid #F5C6D0;border-radius:10px;padding:3px 10px;font-size:9px;color:#C4799C;cursor:pointer;display:none}
.theme-indicator:hover{background:#fff}

/* Toolbar */
.toolbar{margin-top:8px;margin-bottom:16px;display:flex;gap:4px;flex-wrap:wrap;justify-content:center;background:#F5EDE5;padding:6px 10px;border-radius:3px;border:2px solid #C8B8A8;box-shadow:1px 1px 0 #B0A090}
.tbtn{display:flex;align-items:center;gap:3px;padding:4px 8px;background:#FFF0E8;border:2px solid #D8C0B0;border-radius:3px;font-family:inherit;font-size:10px;font-weight:700;color:#8B6050;cursor:pointer;box-shadow:1px 1px 0 #C0A898}
.tbtn:hover{background:#FFE8D8;box-shadow:none;transform:translateY(1px)}
.tbtn:active{background:#FFD8C8}
.tbtn input[type=file]{display:none}

/* Drop overlay & notification */
.drop-ov{position:absolute;inset:0;background:rgba(231,84,128,.15);border:3px dashed #E75480;border-radius:10px;display:none;align-items:center;justify-content:center;z-index:50;pointer-events:none;font-size:16px;font-weight:700;color:#E75480}
.room.dragover .drop-ov{display:flex}
.notif{position:fixed;top:16px;right:16px;background:rgba(255,255,255,.95);border:2px solid #FFB5C8;border-radius:12px;padding:8px 16px;font-size:12px;color:#C4506A;box-shadow:0 4px 12px rgba(231,84,128,.15);transform:translateX(300px);transition:transform .3s;z-index:100}
.notif.show{transform:translateX(0)}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:24px;width:400px;max-width:90vw;box-shadow:0 8px 30px rgba(0,0,0,.2);text-align:center;font-family:inherit}
.modal-box h3{color:#E75480;margin-bottom:12px;font-size:16px}
.modal-box p{font-size:12px;color:#888;margin-bottom:10px}
.modal-url{width:100%;padding:8px;border:2px solid #F5C6D0;border-radius:8px;font-size:11px;font-family:inherit;color:#555;background:#FFF5F8;text-align:center;margin-bottom:10px}
.modal-btns{display:flex;gap:8px;justify-content:center}
.modal-btn{padding:8px 16px;border-radius:8px;border:2px solid #FFB5C8;background:linear-gradient(180deg,#FFE4EC,#FFD0DD);font-family:inherit;font-size:12px;font-weight:700;color:#C4506A;cursor:pointer}
.modal-btn:hover{background:linear-gradient(180deg,#FFD0DD,#FFBCCC)}
.modal-btn.secondary{background:#fff;color:#999;border-color:#ddd}
/* Invite join screen */
.join-screen{display:none;position:fixed;inset:0;background:linear-gradient(180deg,#FFF0F5,#FFE4EC 50%,#F5E6FF);z-index:300;align-items:center;justify-content:center}
.join-screen.show{display:flex}
.join-card{background:#fff;border-radius:20px;padding:32px;width:340px;text-align:center;box-shadow:0 8px 30px rgba(231,84,128,.2);border:2px solid #F5C6D0}
.join-card h2{color:#E75480;margin-bottom:6px}
.join-card p{font-size:12px;color:#C4799C;margin-bottom:16px}
.join-card input[type=text]{width:100%;padding:10px;border:2px solid #F5C6D0;border-radius:10px;font-family:inherit;font-size:14px;text-align:center;margin-bottom:10px;outline:none}
.join-card label{display:inline-block;padding:8px 16px;background:linear-gradient(180deg,#FFE4EC,#FFD0DD);border:2px solid #FFB5C8;border-radius:10px;font-size:12px;font-weight:700;color:#C4506A;cursor:pointer;margin-bottom:10px}
.join-card label input{display:none}
.join-photo-preview{width:60px;height:60px;border-radius:50%;margin:8px auto;border:3px solid #F5C6D0;overflow:hidden;display:none}
.join-photo-preview img{width:100%;height:100%;object-fit:cover}
.join-btn{padding:10px 28px;background:linear-gradient(180deg,#FF8FAB,#E75480);border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;color:#fff;cursor:pointer;margin-top:8px}
.join-btn:hover{opacity:.9}
</style>
</head>
<body>
<div class="banner"><h1>&#10048; Yong's Miniroom &#10048;</h1><div class="sub">Welcome to my cozy space~</div></div>
<div class="vc" id="vc">Today 1 | Total 486</div>

<div class="room-wrap">
<div class="room" id="room">
  <div class="wl"></div><div class="wr"></div><div class="wc"></div>
  <div class="bl"></div><div class="br"></div><div class="fl"></div>

  <!-- SVG Furniture -->
  <svg id="fsvg" viewBox="0 0 820 560" xmlns="http://www.w3.org/2000/svg"></svg>

  <!-- Content overlays (photo, video) -->
  <div class="content-overlay" id="contentLayer"></div>
  <div class="theme-indicator" id="themeTag" onclick="triggerAITheme()"></div>

  <!-- Avatars (미니미 Canvas 픽셀아트) -->
  <div class="avatar" id="yongAvatar" style="left:370px;top:350px">
    <div class="avatar-bubble">Yong</div>
    <div class="minimi">
      <div class="minimi-head" id="yongPhoto"><img id="yongPhotoImg"></div>
      <canvas id="yongCanvas"></canvas>
    </div>
  </div>
  <div class="avatar friend-avatar" id="friendAvatar" style="left:420px;top:360px">
    <div class="avatar-bubble" id="friendName">Friend</div>
    <span class="friend-delete" onclick="removeFriend()" title="1촌 삭제">&#10005;</span>
    <div class="minimi">
      <div class="minimi-head" id="friendHead"><img id="friendHeadImg"></div>
      <canvas id="friendCanvas"></canvas>
    </div>
  </div>

  <!-- Chat panel -->
  <div class="chat-panel" id="chatPanel" style="display:none">
    <div class="chat-log" id="chatLog"></div>
    <div class="chat-sender" style="display:flex;align-items:center;padding:2px 8px;border-top:1px solid #F5C6D0;font-size:9px;color:#999">
      <span id="senderLabel" style="font-weight:700;color:#E75480;cursor:pointer" onclick="toggleSender()">Yong</span>
      <span style="margin:0 4px">으로 전송</span>
      <span style="font-size:8px;color:#bbb;cursor:pointer" onclick="toggleSender()">[전환]</span>
    </div>
    <div class="chat-input-wrap">
      <input id="chatInput" placeholder="메시지 입력..." maxlength="100">
      <button onclick="sendChat()">전송</button>
    </div>
  </div>

  <!-- BGM -->
  <div class="bgm"><span id="bgmNote">&#9834;</span><span class="bgm-title" id="bgmTitle">BGM 없음</span>
    <button class="bgm-btn" id="bgmBtn" onclick="toggleBGM()" disabled>&#9654;</button>
    <audio id="bgmAudio" loop></audio>
  </div>

  <div class="drop-ov">파일을 여기에 놓으세요!</div>
</div>
</div>

<div class="toolbar">
  <label class="tbtn">&#128247; 사진<input type="file" id="inPhoto" accept="image/*" multiple></label>
  <label class="tbtn">&#128250; 영상<input type="file" id="inVideo" accept="video/*"></label>
  <label class="tbtn">&#128218; 파일<input type="file" id="inFile" multiple></label>
  <label class="tbtn">&#127925; BGM<input type="file" id="inBGM" accept="audio/*"></label>
  <label class="tbtn">&#128100; 내 사진<input type="file" id="inFace" accept="image/*"></label>
  <button class="tbtn" onclick="inviteFriend()">&#128101; 1촌 초대</button>
  <button class="tbtn" onclick="shareRoom()">&#128279; 공유하기</button>
  <button class="tbtn" onclick="triggerAITheme()">&#127912; AI 인테리어</button>
</div>
<div class="notif" id="notif"></div>

<!-- AI API Key Modal -->
<div class="ai-modal" id="aiModal">
  <div class="ai-modal-box">
    <h3>&#127912; AI 인테리어</h3>
    <p>서재의 파일 내용을 AI가 분석해서<br>방 인테리어를 자동으로 바꿔줘요!<br><br>Google Gemini API 키가 필요해요.<br><a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:#E75480">여기서 무료 발급</a></p>
    <input type="text" id="aiKeyInput" placeholder="Gemini API Key 입력...">
    <div class="ai-btns">
      <button class="ai-ok" onclick="saveAIKeyAndRun()">적용하기</button>
      <button class="ai-cancel" onclick="document.getElementById('aiModal').classList.remove('show')">취소</button>
    </div>
  </div>
</div>

<!-- Share/Invite Modal -->
<div class="modal-overlay" id="shareModal">
  <div class="modal-box">
    <h3 id="modalTitle">공유하기</h3>
    <p id="modalDesc">이 링크를 공유하면 상대방이 미니룸을 볼 수 있어요!</p>
    <input class="modal-url" id="modalUrl" readonly onclick="this.select()">
    <div class="modal-btns">
      <button class="modal-btn" onclick="copyModalUrl()">복사하기</button>
      <button class="modal-btn secondary" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<!-- Friend Join Screen -->
<div class="join-screen" id="joinScreen">
  <div class="join-card">
    <h2>&#10048; 미니룸 초대 &#10048;</h2>
    <p id="joinMsg">Yong님의 미니룸에 초대되었어요!</p>
    <input type="text" id="joinName" placeholder="이름을 입력하세요">
    <br>
    <label>&#128247; 내 사진 올리기<input type="file" id="joinPhoto" accept="image/*"></label>
    <div class="join-photo-preview" id="joinPreview"><img id="joinPreviewImg"></div>
    <br>
    <button class="join-btn" onclick="completeJoin()">입장하기!</button>
  </div>
</div>

<script>
// ===== ISOMETRIC ENGINE =====
// 3D→2D: x=along left wall, y=along right wall, z=up
function iso(x, y, z) {
  return [410 + (y - x), 245 + (x + y) / 3 - z];
}
function pts(verts) { return verts.map(v => iso(...v).map(n=>n.toFixed(1)).join(',')).join(' '); }

  projectId: "miniroom-430f4",

function dataUrlToBlob(dataUrl) {
  const parts = dataUrl.split(',');
  const mime = parts[0].match(/:(.*?);/)[1];
  const b64 = atob(parts[1]);
  const arr = new Uint8Array(b64.length);
  for (let i = 0; i < b64.length; i++) arr[i] = b64.charCodeAt(i);
  return new Blob([arr], {type: mime});
}
async function supaUpload(fileName, dataUrl) {
  // Handle both data URLs and http URLs
  let blob;
  if (dataUrl.startsWith('data:')) {
    blob = dataUrlToBlob(dataUrl);
  } else if (dataUrl.startsWith('http')) {
    const res = await fetch(dataUrl);
    blob = await res.blob();
  } else {
    throw new Error('Invalid data');
  }
  let mime = blob.type;
  if (fileName.endsWith('.mp4')) mime = 'video/mp4';
  else if (fileName.endsWith('.mp3')) mime = 'audio/mpeg';
  const path = 'rooms/' + Date.now() + '_' + fileName;
  const upRes = await fetch(SUPA_URL + '/storage/v1/object/media/' + path, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + SUPA_KEY,
      'apikey': SUPA_KEY,
      'Content-Type': mime || 'application/octet-stream',
      'x-upsert': 'true'
    },
    body: blob
  });
  if (!upRes.ok) throw new Error('업로드 실패: ' + upRes.status);
  return SUPA_URL + '/storage/v1/object/public/media/' + path;
}

// ===== INDEXEDDB STORAGE =====
const DB_NAME = 'miniroomDB', DB_VER = 1;
let db = null;
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('files')) d.createObjectStore('files');
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => reject(e);
  });
}
function dbPut(key, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('files','readwrite');
    tx.objectStore('files').put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e);
  });
}
function dbGet(key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('files','readonly');
    const req = tx.objectStore('files').get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = e => reject(e);
  });
}
function fileToDataURL(file) {
  return new Promise((resolve) => {
    const r = new FileReader();
    r.onload = e => resolve(e.target.result);
    r.readAsDataURL(file);
  });
}

// 3-tone isometric box with dark pixel outline (Cyworld style)
function box(x,y,z,w,d,h,ct,cl,cr) {
  const top = [[x,y,z+h],[x+w,y,z+h],[x+w,y+d,z+h],[x,y+d,z+h]];
  const left = [[x,y+d,z],[x+w,y+d,z],[x+w,y+d,z+h],[x,y+d,z+h]];
  const right = [[x+w,y,z],[x+w,y+d,z],[x+w,y+d,z+h],[x+w,y,z+h]];
  return `<polygon points="${pts(right)}" fill="${cr}" stroke="${OL}" stroke-width="1.2"/>` +
    `<polygon points="${pts(left)}" fill="${cl}" stroke="${OL}" stroke-width="1.2"/>` +
    `<polygon points="${pts(top)}" fill="${ct}" stroke="${OL}" stroke-width="1.2"/>`;
}

      const rod = [[x-2,y+d+0.5,z+h],[x+w+2,y+d+0.5,z+h],[x+w+2,y+d+0.5,z+h+2],[x-2,y+d+0.5,z+h+2]];
      html += `<polygon points="${pts(rod)}" fill="#c9a979" stroke="${OL}" stroke-width="0.8"/>`;
    }
    else if (id === 'clock') {
      // Round wall clock
      const center = iso(x+w/2, y+d+0.5, z+h/2);
      // Clock face circle
      html += `<circle cx="${center[0]}" cy="${center[1]}" r="12" fill="#f8f0e0" stroke="${OL}" stroke-width="1.5"/>`;
      // Clock inner ring
      html += `<circle cx="${center[0]}" cy="${center[1]}" r="10" fill="none" stroke="#c9a979" stroke-width="0.5"/>`;
      // Hour marks (12, 3, 6, 9)
      html += `<line x1="${center[0]}" y1="${center[1]-9}" x2="${center[0]}" y2="${center[1]-7}" stroke="${OL}" stroke-width="1"/>`;
      html += `<line x1="${center[0]+9}" y1="${center[1]}" x2="${center[0]+7}" y2="${center[1]}" stroke="${OL}" stroke-width="1"/>`;
      html += `<line x1="${center[0]}" y1="${center[1]+9}" x2="${center[0]}" y2="${center[1]+7}" stroke="${OL}" stroke-width="1"/>`;
      html += `<line x1="${center[0]-9}" y1="${center[1]}" x2="${center[0]-7}" y2="${center[1]}" stroke="${OL}" stroke-width="1"/>`;
      // Hour hand
      html += `<line x1="${center[0]}" y1="${center[1]}" x2="${center[0]+4}" y2="${center[1]-5}" stroke="${OL}" stroke-width="1.2"/>`;
      // Minute hand
      html += `<line x1="${center[0]}" y1="${center[1]}" x2="${center[0]-2}" y2="${center[1]-7}" stroke="${OL}" stroke-width="0.8"/>`;
      // Center dot
      html += `<circle cx="${center[0]}" cy="${center[1]}" r="1.2" fill="${OL}"/>`;
    }
    else {
      html += box(x,y,z,w,d,h,c.top,c.left,c.right);
    }
    html += '</g>';
  }
  svg.innerHTML = html;

  // Click handlers are now in drag system (only fire if not dragged)

  // Position content overlays
  positionOverlays();
}

// ===== CONTENT OVERLAYS =====
function positionOverlays() {
  const cl = document.getElementById('contentLayer');
  // Frame photo overlay - on the "left" face (y=py+d) of frame
  const f = FURN.find(f=>f.id==='frame');
  const fp = [iso(f.x, f.y+f.d, f.z), iso(f.x+f.w, f.y+f.d, f.z), iso(f.x+f.w, f.y+f.d, f.z+f.h), iso(f.x, f.y+f.d, f.z+f.h)];
  const fMinX = Math.min(...fp.map(p=>p[0])), fMaxX = Math.max(...fp.map(p=>p[0]));
  const fMinY = Math.min(...fp.map(p=>p[1])), fMaxY = Math.max(...fp.map(p=>p[1]));
  const fClip = fp.map(p => `${p[0]-fMinX}px ${p[1]-fMinY}px`).join(',');

  // TV overlay - on the "right" face (x=px+w) of tv
  const t = FURN.find(f=>f.id==='tv');
  const tp = [iso(t.x+t.w, t.y, t.z), iso(t.x+t.w, t.y+t.d, t.z), iso(t.x+t.w, t.y+t.d, t.z+t.h), iso(t.x+t.w, t.y, t.z+t.h)];
  const tMinX = Math.min(...tp.map(p=>p[0])), tMaxX = Math.max(...tp.map(p=>p[0]));
  const tMinY = Math.min(...tp.map(p=>p[1])), tMaxY = Math.max(...tp.map(p=>p[1]));
  const tClip = tp.map(p => `${p[0]-tMinX}px ${p[1]-tMinY}px`).join(',');

  cl.innerHTML = `
    <img id="framePhoto" style="left:${fMinX}px;top:${fMinY}px;width:${fMaxX-fMinX}px;height:${fMaxY-fMinY}px;clip-path:polygon(${fClip})">
    <div class="frame-placeholder" id="framePH" onclick="document.getElementById('inPhoto').click()" style="left:${fMinX}px;top:${fMinY}px;width:${fMaxX-fMinX}px;height:${fMaxY-fMinY}px;clip-path:polygon(${fClip})">&#128247;<br>사진 올리기</div>
    <div class="frame-counter" id="frameCtr" style="left:${fMaxX-30}px;top:${fMaxY-14}px"></div>
    <div class="tv-wrap" id="tvWrap" style="left:${tMinX}px;top:${tMinY}px;width:${tMaxX-tMinX}px;height:${tMaxY-tMinY}px;clip-path:polygon(${tClip})">
      <video id="tvVideo" style="width:100%;height:100%;object-fit:cover"></video>
      <div class="tv-crt" style="width:100%;height:100%;top:0;left:0"></div>
    </div>
    <div class="tv-controls" id="tvCtrl" style="display:none;left:${tp[0][0]}px;top:${tp[0][1]+2}px;width:${tMaxX-tMinX-10}px">
      <button class="tv-btn" id="tvPlayBtn" onclick="toggleTV()">&#9654;</button>
      <span class="tv-time" id="tvTime">00:00</span>
      <div class="tv-progress" id="tvProg" onclick="seekTV(event)"><div class="tv-progress-fill" id="tvProgFill"></div></div>
      <div class="tv-vol" onclick="setTVVol(event)"><div class="tv-vol-fill" id="tvVolFill"></div></div>
      <button class="tv-btn" style="font-size:8px" onclick="toggleTVFull()">&#9974;</button>
    </div>
    <div class="tv-placeholder" id="tvPH" onclick="document.getElementById('inVideo').click()" style="left:${tMinX}px;top:${tMinY}px;width:${tMaxX-tMinX}px;height:${tMaxY-tMinY}px;clip-path:polygon(${tClip})">&#128250;<br>영상 올리기</div>
  `;
}

function drawMinimi(canvasId, opts) {
  // 32x48 pixel grid, scale 2px — cap+hoodie boy matching reference image
  const o = Object.assign({
    hair:'#5A3825', hairHi:'#7A5035', hairDk:'#3A1810',
    skin:'#FDCC9B', skinSh:'#E0A870', skinHi:'#FFE8D0',
    eyeW:'#FFFFFF', pupil:'#1A1008', iris:'#4A3020',
    blush:'#F0A090', mouth:'#D06050', mouthIn:'#B04838',
    cap:'#384058', capHi:'#485068', capDk:'#282838', capBrim:'#303848',
    hoodie:'#8A9068', hoodieSh:'#707850', hoodieHi:'#A0A880', hoodieDk:'#606840',
    pocket:'#E8E0D0', pocketSh:'#D0C8B8',
    pants:'#7090B0', pantsSh:'#506880', pantsHi:'#88A8C8',
    shoe:'#A8A098', shoeSh:'#888078', shoeHi:'#C0B8B0', soleSh:'#787068',
    outline:'#282018'

  const W=32, H=48, S=2;
  const c = document.getElementById(canvasId);
  if(!c) return;
  c.width = W*S; c.height = H*S;
  c.style.width = W*S+'px'; c.style.height = H*S+'px';
  c.style.imageRendering = 'pixelated';
  const x = c.getContext('2d');
  const P = (cx,cy,col) => { x.fillStyle=col; x.fillRect(cx*S,cy*S,S,S); };
  const R = (cx,cy,w,h,col) => { x.fillStyle=col; x.fillRect(cx*S,cy*S,w*S,h*S); };
  const OL = o.outline;

  // === CAP (navy, with brim) ===
  R(9,0,14,1,OL);
  R(8,1,16,1,OL); R(9,1,14,1,o.cap); P(12,1,o.capHi); P(15,1,o.capHi);
  R(7,2,18,1,OL); R(8,2,16,1,o.cap); P(10,2,o.capHi); P(14,2,o.capHi);
  R(6,3,20,1,OL); R(7,3,18,1,o.cap); P(9,3,o.capHi); P(13,3,o.capHi);
  R(5,4,22,1,OL); R(6,4,20,1,o.cap); P(11,4,o.capHi);
  R(5,5,22,1,OL); R(6,5,20,1,o.capDk);
  // Brim (extends left, darker)
  R(2,6,24,1,OL); R(3,6,22,1,o.capBrim); P(5,6,o.capDk); P(22,6,o.capDk);
  R(1,7,26,1,OL); R(2,7,24,1,o.capBrim); R(2,7,4,1,o.capDk);
  R(2,8,24,1,OL); // brim bottom outline

  // === HAIR (messy, sticking out from cap) ===
  // Left side hair
  P(4,5,OL); P(3,6,OL); P(3,7,OL); P(3,8,o.hair); P(4,8,o.hair);
  P(4,9,o.hair); P(3,9,o.hair); P(2,9,OL); P(2,10,OL);
  P(3,10,o.hair); P(4,10,o.hair); P(3,11,o.hair); P(4,11,o.hairDk);
  P(3,12,o.hairDk); P(4,12,o.hair); P(3,13,OL); P(4,13,o.hairDk);
  P(4,14,OL); P(5,14,o.hairDk);
  // Right side hair
  P(27,5,OL); P(27,6,OL); P(27,7,o.hair); P(26,7,o.hair);
  P(27,8,o.hair); P(28,8,OL); P(27,9,o.hair); P(28,9,OL);
  P(27,10,o.hair); P(28,10,OL); P(27,11,o.hairDk); P(28,11,OL);

  // Bangs under cap
  R(6,7,20,1,o.hair); R(7,7,4,1,o.hairHi);
  R(5,8,22,1,o.hair); R(8,8,3,1,o.hairHi); R(17,8,2,1,o.hairHi);

  R(5,9,22,1,o.skin); R(5,10,22,1,o.skin); R(5,11,22,1,o.skin);

  // Face outline
  for(let i=9;i<=14;i++){P(4,i,OL);P(27,i,OL);}
  P(5,15,OL); P(26,15,OL); P(6,16,OL); P(25,16,OL);
  P(7,17,OL); P(24,17,OL); P(8,18,OL); P(23,18,OL);
  // Skin shadow near hair
  R(5,9,22,1,o.skinSh); R(6,9,4,1,o.skin); R(14,9,8,1,o.skin);
  P(7,10,o.skinHi); P(8,10,o.skinHi);

  // === EYES (angled, expressive — matching ref) ===
  // Left eye
  P(8,11,OL);P(9,11,OL);P(10,11,OL);P(11,11,OL); // brow line
  P(8,12,OL); R(9,12,3,1,o.eyeW); P(12,12,OL);
  P(8,13,OL); R(9,13,3,1,o.eyeW); P(12,13,OL);
  P(9,14,OL); P(10,14,OL); P(11,14,OL);
  // pupil
  P(10,12,o.iris); P(11,12,o.pupil);
  P(10,13,o.iris); P(11,13,o.pupil);

  // === BLUSH ===

  R(13,16,2,1,o.mouth); R(15,16,2,1,o.mouth);

  R(12,19,8,1,o.skin); P(11,19,OL); P(20,19,OL);

  // === HOODIE (olive green with white kangaroo pocket) ===
  // Shoulders
  R(9,20,14,1,OL); R(10,20,12,1,o.hoodie);

  P(14,20,'#D0D0C0'); P(17,20,'#D0D0C0'); P(14,21,'#D0D0C0'); P(17,21,'#D0D0C0');
  // Body
  R(6,22,20,1,OL); R(7,22,18,1,o.hoodie); P(8,22,o.hoodieHi);

  R(4,25,24,1,OL); R(5,25,22,1,o.hoodie);

  P(4,23,o.hoodie); P(27,23,o.hoodie);
  P(4,24,o.hoodieSh); P(27,24,o.hoodieSh);
  // Kangaroo pocket (white/cream rectangle)
  R(11,25,10,3,o.pocket); R(12,25,8,1,o.pocketSh);
  P(11,25,OL); P(20,25,OL); P(11,27,OL); P(20,27,OL); // pocket corners

  // Hands (skin, in pocket)
  R(5,28,4,1,o.skin); R(23,28,4,1,o.skin);
  P(5,28,OL); P(8,28,OL); P(23,28,OL); P(26,28,OL);
  P(5,29,OL); P(8,29,OL); P(23,29,OL); P(26,29,OL);
  R(6,29,2,1,o.skin); R(24,29,2,1,o.skin);

  // === PANTS (jeans, blue) ===
  R(8,30,16,1,OL); R(9,30,14,1,o.pants);

  R(8,32,16,1,OL); R(9,32,14,1,o.pants);

  R(8,33,7,1,OL); R(17,33,7,1,OL); R(9,33,5,1,o.pants); R(18,33,5,1,o.pants);
  R(8,34,7,1,OL); R(17,34,7,1,OL); R(9,34,5,1,o.pants); R(18,34,5,1,o.pants);
  R(8,35,7,1,OL); R(17,35,7,1,OL); R(9,35,5,1,o.pantsSh); R(18,35,5,1,o.pantsSh);
  R(7,36,8,1,OL); R(17,36,8,1,OL); R(8,36,6,1,o.pants); R(18,36,6,1,o.pants);

  R(7,37,8,1,OL); R(17,37,8,1,OL); R(8,37,6,1,o.pantsHi); R(18,37,6,1,o.pantsHi);

  // === SHOES (gray sneakers) ===

  // === SHADOW ===
  x.fillStyle = 'rgba(0,0,0,0.08)';

}

(function(){
  let dragAvatar = null, avOff = [0,0];
  function onDown(e) {
    const av = e.target.closest('.avatar');
    if (!av) return;
    dragAvatar = av;
    avOff = [e.clientX - av.offsetLeft, e.clientY - av.offsetTop];
    e.preventDefault();
  }
  function onMove(e) {
    if (!dragAvatar) return;
    const room = document.getElementById('room').getBoundingClientRect();
    let nx = e.clientX - avOff[0], ny = e.clientY - avOff[1];
    nx = Math.max(0, Math.min(room.width - 40, nx));
    ny = Math.max(60, Math.min(room.height - 20, ny));
    dragAvatar.style.left = nx + 'px';
    dragAvatar.style.top = ny + 'px';
  }
  function onUp() {
    if (dragAvatar) {
      localStorage.setItem('miniroom_av_' + dragAvatar.id, JSON.stringify({l:dragAvatar.style.left,t:dragAvatar.style.top}));
    }
    dragAvatar = null;
  }
  document.querySelectorAll('.avatar').forEach(a => {
    a.addEventListener('mousedown', onDown);
    a.addEventListener('touchstart', function(e){ const t=e.touches[0]; onDown({target:e.target,clientX:t.clientX,clientY:t.clientY,preventDefault:()=>e.preventDefault()}); }, {passive:false});
  });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', function(e){ if(!dragAvatar) return; const t=e.touches[0]; onMove({clientX:t.clientX,clientY:t.clientY}); e.preventDefault(); }, {passive:false});
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchend', onUp);
  // Restore positions
  ['yongAvatar','friendAvatar'].forEach(id => {
    const saved = localStorage.getItem('miniroom_av_' + id);
    if (saved) { const p = JSON.parse(saved); const el = document.getElementById(id); if(el){el.style.left=p.l;el.style.top=p.t;} }
  });
})();

});

// ===== DRAG FURNITURE (wall + floor) =====
let dragFurn = null, dragOff = [0,0], dragMoved = false, dragStartXY = [0,0];
const WALL_IDS = ['frame','window','clock']; // items on back wall (y~0), move x/z

document.getElementById('fsvg').addEventListener('mousedown', function(e) {
  const g = e.target.closest('.furn-group');
  if (!g) return;
  const id = g.dataset.id;
  dragFurn = FURN.find(f=>f.id===id);
  if (!dragFurn) return;
  dragMoved = false;
  dragStartXY = [e.clientX, e.clientY];
  const room = document.getElementById('room').getBoundingClientRect();
  const sx = e.clientX - room.left, sy = e.clientY - room.top;
  const isWall = WALL_IDS.includes(id);
  const cz = isWall ? dragFurn.z + dragFurn.h/2 : 0;
  const center = iso(dragFurn.x + dragFurn.w/2, dragFurn.y + dragFurn.d/2, cz);
  dragOff = [sx - center[0], sy - center[1]];
  e.preventDefault();
});

document.addEventListener('mousemove', function(e) {
  if (!dragFurn) return;
  const dx = e.clientX - dragStartXY[0], dy = e.clientY - dragStartXY[1];
  if (!dragMoved && Math.abs(dx) + Math.abs(dy) > 4) dragMoved = true;
  if (!dragMoved) return;

  const room = document.getElementById('room').getBoundingClientRect();
  const sx = e.clientX - room.left - dragOff[0];
  const sy = e.clientY - room.top - dragOff[1];
  const isWall = WALL_IDS.includes(dragFurn.id);

  if (isWall) {
    // Wall items: move x and z, keep y fixed (on back wall)
    // iso(x,y,z) = [410+(y-x), 245+(x+y)/3-z]
    // screenX = 410 + fixedY - x  =>  x = 410 + fixedY - screenX
    const fixedY = dragFurn.y;
    const newX = 410 + fixedY - sx - dragFurn.w/2;
    const newZ = 245 + (newX + dragFurn.w/2 + fixedY)/3 - sy - dragFurn.h/2;
    dragFurn.x = Math.max(0, Math.min(300, newX));
    dragFurn.z = Math.max(0, Math.min(180, newZ));
  } else {
    // Floor items: move x and y, keep z fixed
    const ix = ((sy - 245) * 3 - (sx - 410)) / 2 - dragFurn.w / 2;
    const iy = ((sx - 410) + (sy - 245) * 3) / 2 - dragFurn.d / 2;
    dragFurn.x = Math.max(0, Math.min(320, ix));
    dragFurn.y = Math.max(0, Math.min(320, iy));
  }
  renderFurniture();
});

document.addEventListener('mouseup', function() {
  if (dragFurn) {
    if (!dragMoved) {
      // Click (no drag) — trigger file pickers
      const id = dragFurn.id;
      if (id==='frame') document.getElementById('inPhoto').click();
      else if (id==='tv') document.getElementById('inVideo').click();
      else if (id==='bookshelf') document.getElementById('inFile').click();
    } else {
      // Save positions after drag
      const positions = {};
      FURN.forEach(f => { positions[f.id] = {x:f.x, y:f.y, z:f.z, w:f.w, d:f.d}; });
      dbPut('furnPositions', positions);
    }
    dragFurn = null;
  }
});

// Touch support for mobile drag
document.getElementById('fsvg').addEventListener('touchstart', function(e) {
  const t = e.touches[0];
  const g = document.elementFromPoint(t.clientX, t.clientY);
  const fg = g && g.closest('.furn-group');
  if (!fg) return;
  const id = fg.dataset.id;
  dragFurn = FURN.find(f=>f.id===id);
  if (!dragFurn) return;
  dragMoved = false;
  dragStartXY = [t.clientX, t.clientY];
  const room = document.getElementById('room').getBoundingClientRect();
  const sx = t.clientX - room.left, sy = t.clientY - room.top;
  const isWall = WALL_IDS.includes(id);
  const cz = isWall ? dragFurn.z + dragFurn.h/2 : 0;
  const center = iso(dragFurn.x + dragFurn.w/2, dragFurn.y + dragFurn.d/2, cz);
  dragOff = [sx - center[0], sy - center[1]];
  e.preventDefault();
}, {passive:false});
document.addEventListener('touchmove', function(e) {
  if (!dragFurn) return;
  const t = e.touches[0];
  const fakeE = {clientX:t.clientX, clientY:t.clientY};
  const dx = fakeE.clientX - dragStartXY[0], dy = fakeE.clientY - dragStartXY[1];
  if (!dragMoved && Math.abs(dx)+Math.abs(dy)>4) dragMoved = true;
  if (!dragMoved) return;
  const room = document.getElementById('room').getBoundingClientRect();
  const sx = fakeE.clientX - room.left - dragOff[0];
  const sy = fakeE.clientY - room.top - dragOff[1];
  const isWall = WALL_IDS.includes(dragFurn.id);
  if (isWall) {
    const fixedY = dragFurn.y;
    const newX = 410 + fixedY - sx - dragFurn.w/2;
    const newZ = 245 + (newX+dragFurn.w/2+fixedY)/3 - sy - dragFurn.h/2;
    dragFurn.x = Math.max(0, Math.min(300, newX));
    dragFurn.z = Math.max(0, Math.min(180, newZ));
  } else {
    const ix = ((sy-245)*3-(sx-410))/2-dragFurn.w/2;
    const iy = ((sx-410)+(sy-245)*3)/2-dragFurn.d/2;
    dragFurn.x = Math.max(0, Math.min(320, ix));
    dragFurn.y = Math.max(0, Math.min(320, iy));
  }
  renderFurniture();
  e.preventDefault();
}, {passive:false});
document.addEventListener('touchend', function() {
  if (dragFurn && !dragMoved) {
    const id = dragFurn.id;
    if (id==='frame') document.getElementById('inPhoto').click();
    else if (id==='tv') document.getElementById('inVideo').click();
    else if (id==='bookshelf') document.getElementById('inFile').click();
  }
  if (dragFurn && dragMoved) {
    const positions = {};
    FURN.forEach(f => { positions[f.id] = {x:f.x, y:f.y, z:f.z, w:f.w, d:f.d}; });
    dbPut('furnPositions', positions);
  }
  dragFurn = null;
});

// ===== PHOTO SLIDESHOW =====
const photos = [];
let photoIdx = 0, slideTimer = null;
async function addPhotos(files) {
  const fl = Array.from(files);
  const rem = 10 - photos.length;
  if (rem <= 0) { notify('최대 10장!'); return; }
  const added = fl.slice(0, rem);
  for (const f of added) {
    const dataUrl = await fileToDataURL(f);
    photos.push(dataUrl);
  }
  await dbPut('photos', photos);
  photoIdx = photos.length - added.length;
  showPhoto();
  startSlideshow();
  notify(added.length + '장 액자에 걸림!');
}
function startSlideshow() {
  if (photos.length > 1 && !slideTimer) slideTimer = setInterval(() => { photoIdx = (photoIdx+1)%photos.length; showPhoto(); }, 1000);
}
function showPhoto() {
  const img = document.getElementById('framePhoto');
  if (!img) return;
  img.src = photos[photoIdx]; img.style.display = 'block';
  const ph = document.getElementById('framePH'); if(ph) ph.style.display='none';
  const c = document.getElementById('frameCtr'); if(c){c.style.display='block'; c.textContent=(photoIdx+1)+'/'+photos.length;}
}

function showTVWrap() {
  const w = document.getElementById('tvWrap'); if(w) w.style.display='block';
  const c = document.getElementById('tvCtrl'); if(c) c.style.display='flex';
  const ph = document.getElementById('tvPH'); if(ph) ph.style.display='none';

function toggleTV() {
  const v = document.getElementById('tvVideo'); if(!v) return;
  if (v.paused) { v.play(); document.getElementById('tvPlayBtn').innerHTML='&#9646;&#9646;'; }
  else { v.pause(); document.getElementById('tvPlayBtn').innerHTML='&#9654;'; }
}
function seekTV(e) {
  const v = document.getElementById('tvVideo');
  const bar = document.getElementById('tvProg');
  if(!v||!bar||!v.duration) return;
  const rect = bar.getBoundingClientRect();
  v.currentTime = ((e.clientX - rect.left) / rect.width) * v.duration;
}
function setTVVol(e) {
  const v = document.getElementById('tvVideo');
  const bar = e.currentTarget;
  const rect = bar.getBoundingClientRect();
  const vol = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  v.volume = vol;
  document.getElementById('tvVolFill').style.width = (vol*100)+'%';
}
function toggleTVFull() {
  const v = document.getElementById('tvVideo');
  if(v.requestFullscreen) v.requestFullscreen();
  else if(v.webkitRequestFullscreen) v.webkitRequestFullscreen();
}
function updateTVProgress() {
  const v = document.getElementById('tvVideo'); if(!v||!v.duration) return;
  const pct = (v.currentTime / v.duration) * 100;
  const fill = document.getElementById('tvProgFill'); if(fill) fill.style.width = pct+'%';
  const m = Math.floor(v.currentTime/60), s = Math.floor(v.currentTime%60);
  const tm = document.getElementById('tvTime'); if(tm) tm.textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
setInterval(updateTVProgress, 200);

// ===== BOOKSHELF =====
const BOOK_COLORS = ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98D8C8','#F7DC6F','#BB8FCE','#85C1E9','#F0B27A','#82E0AA'];
const bookFiles = [];
async function addBook(file) {
  const dataUrl = await fileToDataURL(file);
  bookFiles.push({name: file.name, size: file.size, dataUrl: dataUrl});
  await dbPut('books', bookFiles.map(b => ({name:b.name, size:b.size, dataUrl:b.dataUrl})));
  renderBooks();
}
function renderBooks() {
  const svg = document.getElementById('fsvg');
  svg.querySelectorAll('.book-el').forEach(e => e.remove());
  const bs = FURN.find(f=>f.id==='bookshelf');
  const shelfH = bs.h / 4;
  const sd = 3; // shelf thickness
  const maxPerShelf = 10;
  bookFiles.forEach((file, i) => {
    const shelf = Math.floor(i / maxPerShelf);
    const pos = i % maxPerShelf;
    if (shelf >= 4) return;
    // Book width based on file size (thicker for larger files)
    const sizeKB = (file.size || 1024) / 1024;
    const bw = Math.max(4, Math.min(9, 3 + sizeKB / 200));
    // Filename hash for color and height variation
    const fname = file.name || 'file';
    let fh = 0; for(let c of fname) fh = ((fh<<5)-fh)+c.charCodeAt(0);
    const col = BOOK_COLORS[Math.abs(fh) % BOOK_COLORS.length];
    const bh = shelfH - sd - 6 - (Math.abs(fh) % 6); // varying height
    const bd = 14; // book depth (pages go back into shelf)
    const bx = bs.x + 5 + pos * (bs.w - 10) / maxPerShelf;
    const bz = shelf * shelfH + sd + 2;
    const spineY = bs.y + bs.d - 4; // spine recessed 4 units inside shelf front
    const backY = spineY - bd; // pages extend back into shelf
    // Darken/lighten color helper
    const darken = (c, amt) => {
      const n = parseInt(c.slice(1),16);
      const r = Math.max(0,(n>>16)-amt), g = Math.max(0,((n>>8)&0xff)-amt), b = Math.max(0,(n&0xff)-amt);
      return `rgb(${r},${g},${b})`;
    };
    const lighten = (c, amt) => {
      const n = parseInt(c.slice(1),16);
      const r = Math.min(255,(n>>16)+amt), g = Math.min(255,((n>>8)&0xff)+amt), b = Math.min(255,(n&0xff)+amt);
      return `rgb(${r},${g},${b})`;
    };
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.classList.add('book-el');
    g.style.cursor = 'pointer';
    // Book spine (front face - flush with shelf front)
    const sp = [[bx,spineY,bz],[bx+bw,spineY,bz],[bx+bw,spineY,bz+bh],[bx,spineY,bz+bh]];
    const spine = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    spine.setAttribute('points', sp.map(v=>iso(...v).map(n=>n.toFixed(1)).join(',')).join(' '));
    spine.setAttribute('fill', col);
    spine.setAttribute('stroke', darken(col,40));
    spine.setAttribute('stroke-width', '0.5');
    g.appendChild(spine);
    // Book top face (pages visible from above)
    const tp = [[bx,backY,bz+bh],[bx+bw,backY,bz+bh],[bx+bw,spineY,bz+bh],[bx,spineY,bz+bh]];
    const topF = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    topF.setAttribute('points', tp.map(v=>iso(...v).map(n=>n.toFixed(1)).join(',')).join(' '));
    topF.setAttribute('fill', lighten(col,30));
    topF.setAttribute('stroke', darken(col,20));
    topF.setAttribute('stroke-width', '0.3');
    g.appendChild(topF);
    // Book side face (right edge - page edges)
    const sf = [[bx+bw,backY,bz],[bx+bw,spineY,bz],[bx+bw,spineY,bz+bh],[bx+bw,backY,bz+bh]];
    const sideF = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    sideF.setAttribute('points', sf.map(v=>iso(...v).map(n=>n.toFixed(1)).join(',')).join(' '));
    sideF.setAttribute('fill', '#FFFBE8'); // page edges color
    sideF.setAttribute('stroke', '#D0C8B0');
    sideF.setAttribute('stroke-width', '0.3');
    g.appendChild(sideF);
    // Title text on spine (vertical, abbreviated)
    const spMid = iso(bx + bw/2, spineY, bz + bh/2);
    const title = fname.replace(/\.[^.]+$/,'');
    const shortTitle = title.length > 4 ? title.slice(0,4) : title;
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', spMid[0]);
    txt.setAttribute('y', spMid[1]);
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('dominant-baseline','middle');
    txt.setAttribute('font-size', Math.min(6, bw * 0.8));
    txt.setAttribute('fill', darken(col,80));
    txt.setAttribute('font-weight', '700');
    txt.setAttribute('font-family', 'Nanum Gothic, sans-serif');
    txt.setAttribute('writing-mode', 'tb');
    txt.textContent = shortTitle;
    g.appendChild(txt);
    // Events
    g.addEventListener('mouseenter', e => {
      const tt = document.getElementById('bookTT');
      tt.textContent = fname; tt.style.display = 'block';
      tt.style.left = e.clientX+'px'; tt.style.top = (e.clientY-26)+'px';
    });
    g.addEventListener('mousemove', e => {
      const tt = document.getElementById('bookTT');
      tt.style.left = e.clientX+'px'; tt.style.top = (e.clientY-26)+'px';
    });
    g.addEventListener('mouseleave', () => { document.getElementById('bookTT').style.display='none'; });
    g.addEventListener('click', e => {
      e.stopPropagation();
      const dataUrl = file.dataUrl || '';
      if (dataUrl) {
        const a = document.createElement('a'); a.href = dataUrl; a.download = fname; a.click();
      }
    });
    svg.appendChild(g);
  });
}

let currentTheme = 'cherry';

function applyTheme(themeId) {
  const t = ROOM_THEMES[themeId];
  if (!t) return;
  currentTheme = themeId;
  localStorage.setItem('miniroom_theme', themeId);
  // Body
  document.body.style.background = t.body;
  // Walls
  document.querySelector('.wl').style.background = t.wl;
  document.querySelector('.wr').style.background = t.wr;
  document.querySelector('.wc').style.background = t.wc;
  // Floor
  const fl = document.querySelector('.fl');
  const flClip = fl.style.clipPath || getComputedStyle(fl).clipPath;
  fl.style.background = t.fl;
  fl.style.clipPath = flClip; // preserve clip-path
  // Room bg
  document.querySelector('.room').style.background = t.room;
  // Room wrap border
  document.querySelector('.room-wrap').style.borderColor = t.border;
  document.querySelector('.room-wrap').style.background = t.wrap;
  // Baseboards (need to use pseudo-element workaround via CSS variable)
  document.documentElement.style.setProperty('--bl-bg', t.bl);
  document.documentElement.style.setProperty('--br-bg', t.br);
  // Toolbar border
  document.querySelector('.toolbar').style.borderColor = t.border;
  // Update sofa & desk colors
  const sofa = FURN.find(f => f.id === 'sofa');
  if (sofa && t.sofa) { sofa.colors = t.sofa; }
  const desk = FURN.find(f => f.id === 'desk');
  if (desk && t.desk) { desk.colors = t.desk; }
  renderFurniture();
  // Theme tag
  const tag = document.getElementById('themeTag');
  tag.textContent = t.name;
  tag.style.display = 'block';
  tag.style.borderColor = t.border;
  // Re-render books & overlays
  renderBooks();
  notify('테마 적용: ' + t.name);
}

async function extractBookTexts() {
  let texts = [];
  for (const b of bookFiles) {
    texts.push('파일명: ' + b.name);
    if (b.dataUrl && b.dataUrl.startsWith('data:text')) {
      try {
        const content = decodeURIComponent(escape(atob(b.dataUrl.split(',')[1])));
        texts.push(content.substring(0, 500));
      } catch(e) {}
    } else if (b.dataUrl && b.dataUrl.startsWith('data:application/pdf')) {
      texts.push('[PDF 파일]');
    }
  }
  return texts.join('\n');
}

async function callGeminiAI(text) {
  const key = localStorage.getItem('miniroom_gemini_key');
  if (!key) return null;
  const prompt = `다음은 사용자의 미니룸 서재에 있는 파일/문서 목록이다. 이 내용을 분석해서 가장 어울리는 방 테마 1개를 골라줘.

파일 내용:
${text}

선택 가능한 테마: ocean(바다/여행/자연), forest(숲/힐링/자연/에코), space(우주/과학/기술/미래), sunset(따뜻한/감성/노을), cherry(사랑/귀여운/달콤), music(음악/예술/창작), cafe(커피/독서/일상/공부), cyberpunk(게임/코딩/SF/테크)

반드시 테마 ID 하나만 답해. 예: ocean`;

  try {
    const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + key, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
    });
    if (!res.ok) throw new Error('API error: ' + res.status);
    const data = await res.json();
    const answer = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim().toLowerCase() || '';
    // Extract theme ID from response
    for (const id of Object.keys(ROOM_THEMES)) {
      if (answer.includes(id)) return id;
    }
    return null;
  } catch(e) {
    console.warn('Gemini API error:', e);
    notify('AI 호출 실패: ' + e.message);
    return null;
  }
}

// Keyword-based theme detection (works without API)
function detectThemeByKeywords(text) {
  const t = text.toLowerCase();
  const scores = {};
  const rules = {
    ocean: ['바다','해양','여행','travel','ocean','sea','beach','island','섬','서핑','surf','fish','수영','다이빙','cruise','해변'],
    forest: ['숲','자연','nature','forest','tree','나무','eco','환경','plant','식물','green','산','mountain','hiking','등산','캠핑','garden'],
    space: ['우주','space','nasa','별','star','과학','science','로켓','rocket','화성','mars','moon','달','galaxy','블랙홀','quantum','물리','physics','천문'],
    sunset: ['노을','sunset','따뜻','warm','감성','emotion','사랑','love','romantic','가을','autumn','황금','golden','빛','light','석양'],
    music: ['음악','music','노래','song','악기','instrument','piano','guitar','기타','drum','concert','콘서트','jazz','hip','rock','클래식','classical','작곡','rhythm','beat','playlist'],
    cafe: ['커피','coffee','cafe','카페','독서','reading','책','book','공부','study','라떼','latte','에스프레소','espresso','디저트','dessert','브런치'],
    cyberpunk: ['게임','game','코딩','coding','프로그래밍','programming','python','javascript','AI','인공지능','robot','로봇','cyber','해킹','hacking','tech','기술','algorithm','dev','개발','컴퓨터','computer','data','서버','server'],
    cherry: ['꽃','flower','봄','spring','핑크','pink','귀여운','cute','달콤','sweet','cherry','벚꽃','사쿠라','토끼','rabbit','하트','heart','소녀','girl']
  };
  for (const [theme, keywords] of Object.entries(rules)) {
    scores[theme] = 0;
    for (const kw of keywords) {
      if (t.includes(kw)) scores[theme] += 1;
    }
  }
  let best = null, bestScore = 0;
  for (const [theme, score] of Object.entries(scores)) {
    if (score > bestScore) { bestScore = score; best = theme; }
  }
  return bestScore > 0 ? best : null;
}

async function triggerAITheme() {
  if (!bookFiles.length) {
    notify('서재에 파일을 먼저 올려주세요!');

function copyToClipboard(text) {
  // Try modern API first, fallback to execCommand
  if (navigator.clipboard && window.isSecureContext) {
    return navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  }
  return fallbackCopy(text);
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  return Promise.resolve();
}
function copyModalUrl() {
  const url = document.getElementById('modalUrl').value;

// ===== COMPRESS IMAGE FOR SHARING =====
function compressImage(dataUrl, maxW, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      const scale = Math.min(1, maxW / img.width);
      c.width = img.width * scale;
      c.height = img.height * scale;
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

async function buildRoomState() {
  const state = {
    furn: FURN.map(f => ({id:f.id, x:Math.round(f.x), y:Math.round(f.y), z:Math.round(f.z), w:f.w, d:f.d})),
    friend: friendName,
    chat: chatHistory.slice(-20),
    owner: 'Yong',
    chatRoomId: chatRoomId || fbDB.ref('chats').push().key,
    theme: currentTheme
  };
  // Compress photos to small thumbnails
  if (photos.length) {
    state.photos = [];
    for (const p of photos) {
      state.photos.push(await compressImage(p, 200, 0.5));
    }
  }
  // Books: include names (content too large for JSON blob)
  if (bookFiles.length) {
    state.books = bookFiles.map(b => ({name: b.name, size: b.size}));
  }
  // Video: use pre-uploaded Supabase URL
  try {
    const videoUrl = await dbGet('videoUrl');
    if (videoUrl && videoUrl.startsWith('http')) {
      state.videoUrl = videoUrl;
    } else {
      // Fallback: check if video data is already a URL
      const videoData = await dbGet('video');
      if (videoData) {
        if (videoData.startsWith('http')) {
          state.videoUrl = videoData;
        } else {
          // Data URL — try upload now
          notify('영상 업로드 중...');
          state.videoUrl = await supaUpload('video.mp4', videoData);
        }
      }
    }
  } catch(e) { console.warn('Video share failed', e); notify('영상 공유 실패'); }
  // BGM: use pre-uploaded Supabase URL
  try {
    const bgmUrl = await dbGet('bgmUrl');
    const bgmData = await dbGet('bgm');
    if (bgmUrl && bgmUrl.startsWith('http')) {
      state.bgmUrl = bgmUrl;
      state.bgmName = bgmData ? bgmData.name : 'BGM';
    } else if (bgmData) {
      if (bgmData.data && bgmData.data.startsWith('http')) {
        state.bgmUrl = bgmData.data;
        state.bgmName = bgmData.name;
      } else if (bgmData.data) {
        notify('음원 업로드 중...');
        state.bgmUrl = await supaUpload('bgm.mp3', bgmData.data);
        state.bgmName = bgmData.name;
      }
    }
  } catch(e) {
    console.warn('BGM share failed', e);
    const bgmTitle = document.getElementById('bgmTitle').textContent;
    if (bgmTitle && bgmTitle !== 'BGM 없음') state.bgmName = bgmTitle;
  }
  // Face photo (compressed)
  const faceImg = document.getElementById('yongPhotoImg');
  if (faceImg && faceImg.src && faceImg.src.startsWith('data:')) {
    state.face = await compressImage(faceImg.src, 60, 0.5);
  }
  return state;
}

// ===== BYTEBIN STORAGE =====
async function saveToBlob(data) {
  const res = await fetch('https://bytebin.lucko.me/post', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error('저장 실패');
  const j = await res.json();
  if (!j.key) throw new Error('키 없음');
  return j.key;
}
async function loadFromBlob(id) {
  const res = await fetch('https://bytebin.lucko.me/' + id);
  if (!res.ok) throw new Error('로딩 실패');
  return res.json();
}

// Load shared/invite state from URL hash
let sharedState = null;
async function loadSharedState() {
  const hash = location.hash;
  if (hash.startsWith('#invite=')) {
    const idOrData = hash.slice(8);
    try {
      // Try blob ID first (short alphanumeric), fallback to legacy base64
      if (idOrData.length < 100) {
        sharedState = await loadFromBlob(idOrData);
      } else {
        sharedState = JSON.parse(decodeURIComponent(escape(atob(idOrData))));
      }
      document.getElementById('joinMsg').textContent = (sharedState.owner || 'Yong') + '님의 미니룸에 초대되었어요!';
      document.getElementById('joinScreen').classList.add('show');
      await restoreSharedContent(sharedState);
    } catch(e) { console.warn('Invalid invite link', e); }
    return;
  }
  if (!hash.startsWith('#room=')) return;
  const idOrData = hash.slice(6);
  try {
    let state;
    if (idOrData.length < 100) {
      state = await loadFromBlob(idOrData);
    } else {
      state = JSON.parse(decodeURIComponent(escape(atob(idOrData))));
    }
    await restoreSharedContent(state);
  } catch(e) { console.warn('Failed to load shared state', e); }
}

  // Restore saved theme
  const savedTheme = localStorage.getItem('miniroom_theme');
  if (savedTheme && ROOM_THEMES[savedTheme]) applyTheme(savedTheme);
  // Restore saved content from local DB (skip if loaded from URL)
  if (isShared) return;
  await new Promise(r => setTimeout(r, 100));
  try {
    const savedPhotos = await dbGet('photos');
    if (savedPhotos && savedPhotos.length) {
      savedPhotos.forEach(p => photos.push(p));
      showPhoto();
      startSlideshow();
    }
    const savedVideo = await dbGet('video');
    if (savedVideo) {
      const v = document.getElementById('tvVideo');
      if(v){
        v.src = savedVideo;
        v.style.display='block';
        v.muted = true;
        showTVWrap();
        v.addEventListener('loadeddata', () => {
          v.play().then(()=>{document.getElementById('tvPlayBtn').innerHTML='&#9646;&#9646;';}).catch(()=>{});
        }, {once: true});
      }
    }
    const savedBooks = await dbGet('books');
    if (savedBooks && savedBooks.length) {
      savedBooks.forEach(b => bookFiles.push(b));
      renderBooks();
    }
    const savedBGM = await dbGet('bgm');
    if (savedBGM) {
      const a = document.getElementById('bgmAudio');
      a.src = savedBGM.data;
      document.getElementById('bgmTitle').textContent = savedBGM.name;
      document.getElementById('bgmBtn').disabled = false;
    }
    const savedFace = await dbGet('face');
    if (savedFace) {
      document.getElementById('yongPhotoImg').src = savedFace;
      document.getElementById('yongPhoto').classList.add('has-img');
    }
  } catch(e) { console.warn('Restore error:', e); }
  // Autoplay needs user interaction for audio; unmute video + start BGM on first click
  document.addEventListener('click', function autoplayOnce() {
    const v = document.getElementById('tvVideo');
    if (v && v.src && v.paused) { v.muted = false; v.play().catch(()=>{}); document.getElementById('tvPlayBtn').innerHTML='&#9646;&#9646;'; }
    else if (v && v.muted) { v.muted = false; }
    const a = document.getElementById('bgmAudio');
    if (a && a.src && a.paused && !document.getElementById('bgmBtn').disabled) {
      a.play().then(()=>{bgmOn=true;document.getElementById('bgmBtn').innerHTML='&#9646;&#9646;';}).catch(()=>{});
    }
    document.removeEventListener('click', autoplayOnce);
  });
}
init();
</script>
<div class="book-tooltip" id="bookTT"></div>
</body>
</html>
